<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Maktab maslahatchisi lavozimiga suhbatga tayyorgarlik materiali — o'qishga qulay ko'rinishda." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <button id="menuToggle" class="menu-toggle" aria-label="Menyu">
      <span></span><span></span><span></span>

  <div class="layout">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="search-box">
        <input type="search" id="searchInput" placeholder="🔍 Qidirish..." autocomplete="off" />

          <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        </div>

    </aside>
    <div id="overlay" class="overlay"></div>

    <!-- Main -->
    <main id="main" class="main">
      <div id="content" class="content"></div>
    </main>
  </div>

  <button id="toTop" class="to-top" aria-label="Yuqoriga">↑</button>

  <script src="data.js"></script>
  <script src="app.js"></script>
