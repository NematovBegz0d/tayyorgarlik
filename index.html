<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎓 Maktab Maslahatchisi — Suhbatga Tayyorgarlik</title>
  <meta name="description" content="Maktab maslahatchisi suhbatiga to'liq tayyorgarlik materiali — sidebar, toggle, progress va yodlash uchun qulay format." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- MOBILE TOPBAR -->
  <div class="mobile-topbar">
    <button id="menuToggle" class="icon-btn" title="Bo'limlar">☰</button>
    <span class="mobile-title">🎓 Maslahatchi</span>
    <button id="themeToggleMobile" class="icon-btn" title="Mavzu">🌙</button>
  </div>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-badge">🎓 MASLAHATCHI</div>
        <h1 class="sidebar-title">Suhbatga Tayyorgarlik</h1>
        <p class="sidebar-sub">PQ-277 · 776-son · "Kelajak" markazi</p>
      </div>

      <div class="sidebar-progress">
        <div class="progress-label">
          <span>O'zlashtirish</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div class="progress-meta"><span id="progressCount">0 / 0</span> savol yodlandi</div>
      </div>

      <nav id="groupNav" class="group-nav"></nav>

      <div class="sidebar-foot">
        <button id="themeToggle" class="side-btn" title="Mavzu">🌙 Kun/tun</button>
        <button id="resetProgress" class="side-btn" title="Tozalash">↺ Tozalash</button>
      </div>
    </aside>

    <div id="overlay" class="overlay"></div>

    <!-- MAIN -->
    <main class="main">
      <div class="main-search">
        <div class="search-inner">
          <span class="search-icon">🔍</span>
          <input id="searchInput" type="text" placeholder="Savol, kalit so'z yoki mavzu bo'yicha qidiring..." />
          <button id="clearSearch" class="clear-search" title="Tozalash">✕</button>
        </div>
        <div class="main-tools">
          <button id="expandAll" class="tool-btn">⤢ Ochish</button>
          <button id="collapseAll" class="tool-btn">⤡ Yopish</button>
        </div>
      </div>

      <div id="content" class="content"></div>

      <footer class="footer">
        <p>💡 Har javobni "bola manfaati birinchi" bilan yakunlang · IT ustunligingizni eslating · Hujjat raqamini ayting</p>
        <p class="footer-small">Omad tilaymiz! 🌟</p>
      </footer>
    </main>
  </div>

  <button id="backToTop" class="back-to-top" title="Yuqoriga">↑</button>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
